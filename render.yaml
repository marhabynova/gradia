# Render Blueprint (Infrastructure as Code)
# Dokumentasi: https://render.com/docs/blueprint-spec

databases:
  # PostgreSQL Database (pgvector didukung secara default di Render Postgres 14/15/16)
  - name: gradia-db
    plan: free # Free Postgres di Render otomatis expire 90 hari - upgrade sebelum itu untuk data permanen
    databaseName: gradia_prod_db
    user: gradia_admin
    postgresMajorVersion: "15"

services:
  # Redis / Key Value Cache
  - name: gradia-redis
    type: keyvalue
    plan: free
    ipAllowList: [] # Accessible internally only

  # Backend (FastAPI Web Service)
  - name: gradia-backend
    type: web
    runtime: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    plan: free # Free web service tidur setelah 15 menit idle (cold start ~30-50 detik)
    envVars:
      - key: PYTHONPATH
        value: "."
      - key: DATABASE_URL
        fromDatabase:
          name: gradia-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gradia-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DOMAIN_NAME
        sync: false # Isi dengan domain asli Anda di Render Dashboard (mis. contoh.com)
      - key: GEMINI_API_KEY
        sync: false # Admin akan mengisi ini di Render Dashboard
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_WA_NUMBER
        sync: false

  # Frontend (React Static Site)
  - name: gradia-frontend-static
    type: web
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        sync: false # Isi manual dengan URL backend setelah deploy pertama (mis. https://gradia-backend.onrender.com/api/v1), atau subdomain custom Anda
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
