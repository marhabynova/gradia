<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gradia Scraper Settings</title>
  <style>
    body {
      width: 300px;
      font-family: 'Inter', sans-serif;
      padding: 15px;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #fbbf24;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: white;
      box-sizing: border-box;
    }
    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: #fbbf24;
      border: none;
      border-radius: 4px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #f59e0b;
    }
    #status {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #10b981;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>Gradia Dropship Scraper</h3>
  <label for="apiUrl">Gradia Backend API URL:</label>
  <input type="text" id="apiUrl" value="http://localhost:8000/api/v1/admin/dropship/extension-scrape">
  
  <label for="adminToken">Admin Token (Opsional jika Auth):</label>
  <input type="text" id="adminToken" placeholder="Paste token here...">

  <button id="saveBtn">Save Configuration</button>
  <div id="status"></div>

  <script>
    // Save to local storage
    document.getElementById('saveBtn').addEventListener('click', () => {
      const apiUrl = document.getElementById('apiUrl').value;
      const adminToken = document.getElementById('adminToken').value;
      chrome.storage.local.set({ apiUrl, adminToken }, () => {
        document.getElementById('status').innerText = 'Settings saved!';
        setTimeout(() => { document.getElementById('status').innerText = ''; }, 2000);
      });
    });

    // Load from local storage
    chrome.storage.local.get(['apiUrl', 'adminToken'], (result) => {
      if (result.apiUrl) document.getElementById('apiUrl').value = result.apiUrl;
      if (result.adminToken) document.getElementById('adminToken').value = result.adminToken;
    });
  </script>
</body>
</html>
